version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campaign-master-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campaign_master
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: campaign-master-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/campaign_master
      FLASK_APP: run:app
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --reload run:app

volumes:
  postgres_data:

